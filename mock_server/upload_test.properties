# ──────────────────────────────────────────────────────────────
# BTC Upload Load Test — JMeter Properties
# Usage: jmeter -n -t BTC_Upload_LoadTesting.jmx -p upload_test.properties -l result.jtl
# ──────────────────────────────────────────────────────────────

# Target server (mock server)
server_ip=localhost
port=5001

# Absolute path to the testfiles directory (update if needed)
testfiles_dir=C:/Users/shashidhar.yadala/Videos/Load Testing BTC/mock_server/testfiles

# Test duration in seconds
test.duration=300

# ── Thread Group: Upload JMX ──────────────────────────────────
upload_jmx.threads=2
upload_jmx.rampup=30

# ── Thread Group: Upload Test Data CSV ───────────────────────
upload_csv.threads=3
upload_csv.rampup=30

# ── Thread Group: Upload Report JTL ──────────────────────────
upload_report.threads=1
upload_report.rampup=10
